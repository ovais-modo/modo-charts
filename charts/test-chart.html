<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERCOT Battery Capacity Growth — Test</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: #FFFFFF; }
    #chart { width: 100%; height: 100%; min-height: 400px; }
  </style>
</head>
<body>
  <div id="chart"></div>
  <script>
    const data = [{
      x: ['2020', '2021', '2022', '2023', '2024', '2025'],
      y: [1.2, 2.1, 3.5, 5.8, 9.6, 14.0],
      type: 'bar',
      marker: {
        color: '#6366F1',
        line: { width: 0 },
        cornerradius: 3,
      },
      hovertemplate: '%{y:.1f} GW<extra></extra>',
    }];

    const layout = {
      font: { family: '"DM Sans", sans-serif', color: '#111827', size: 13 },
      paper_bgcolor: '#FFFFFF',
      plot_bgcolor: '#FFFFFF',
      margin: { t: 50, r: 20, b: 70, l: 60, pad: 4 },
      title: {
        text: 'ERCOT Battery Storage Installed Capacity (GW)',
        font: { size: 18, color: '#111827' },
        x: 0, xanchor: 'left', y: 0.98,
      },
      xaxis: {
        showgrid: false, showline: true, linecolor: '#D1D5DB', linewidth: 1,
        tickfont: { size: 11, color: '#6B7280' }, tickcolor: '#D1D5DB',
      },
      yaxis: {
        showgrid: true, gridcolor: '#E5E7EB', gridwidth: 1, showline: false,
        tickfont: { size: 11, color: '#6B7280', family: '"DM Mono", monospace' },
        ticksuffix: ' GW', zeroline: true, zerolinecolor: '#D1D5DB',
      },
      annotations: [{
        text: 'Source: Modo Energy',
        xref: 'paper', yref: 'paper', x: 1, y: -0.18,
        xanchor: 'right', showarrow: false,
        font: { size: 10, color: '#9CA3AF', family: '"DM Sans", sans-serif' },
      }],
    };

    Plotly.newPlot('chart', data, layout, {
      responsive: true, displayModeBar: false, staticPlot: false,
    });
    window.addEventListener('resize', () => Plotly.Plots.resize('chart'));
  </script>
</body>
</html>
