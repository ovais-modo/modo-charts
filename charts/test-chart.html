<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERCOT Battery Capacity Growth</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FFFFFF; color: #1A1A1A;
    }
    .chart-wrapper {
      display: flex; flex-direction: column;
      width: 100%; height: 100%;
      padding: 24px 24px 16px 24px;
    }
    .chart-header { margin-bottom: 2px; }
    .chart-header h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 21px; font-weight: 700; line-height: 1.3;
      color: #1A1A1A; margin: 0;
    }
    .chart-header h1 b { font-weight: 800; }
    .chart-subheader {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 400; color: #808080;
      margin-top: 6px; line-height: 1.3;
    }
    #chart { flex: 1; min-height: 0; width: 100%; }
    .chart-footer {
      display: flex; justify-content: space-between;
      align-items: flex-end; padding-top: 10px; gap: 16px;
    }
    .chart-footer-left { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .chart-source {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 400; color: #AAAAAA; line-height: 1.4;
    }
    .chart-note {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 400; color: #AAAAAA; line-height: 1.4;
    }
    .chart-wordmark {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 700; color: #1A1A1A;
      letter-spacing: 0.25em; white-space: nowrap; flex-shrink: 0;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="chart-wrapper">
    <div class="chart-header">
      <h1>Texas enters 2026 with <b>14 GW</b> of battery capacity, nearly double the <b>7.8 GW</b> at the start of 2025</h1>
      <div class="chart-subheader">Cumulative operational BESS capacity (GW)</div>
    </div>

    <div id="chart"></div>

    <div class="chart-footer">
      <div class="chart-footer-left">
        <div class="chart-source">Source: ERCOT, Modo Energy</div>
        <div class="chart-note">Note: Capacity reflects commercially operational grid-scale battery energy storage systems as of year-end.</div>
      </div>
      <div class="chart-wordmark">MODOENERGY</div>
    </div>
  </div>

  <script>
    const years = ['2020', '2021', '2022', '2023', '2024', '2025'];
    const capacity = [0.3, 1.0, 2.1, 3.8, 7.8, 13.9];
    const newAdditions = [0.3, 0.7, 1.1, 1.7, 4.0, 6.1];
    const existing = capacity.map((c, i) => c - newAdditions[i]);

    const data = [
      {
        x: years,
        y: existing,
        name: 'Existing',
        type: 'bar',
        marker: { color: '#8FAADC', line: { width: 0 } },
        hovertemplate: '%{y:.1f} GW<extra>Existing</extra>',
      },
      {
        x: years,
        y: newAdditions,
        name: 'New additions',
        type: 'bar',
        marker: { color: '#4472C4', line: { width: 0 } },
        text: capacity.map(v => v.toFixed(1)),
        textposition: 'outside',
        textfont: { size: 13, color: '#555555', family: '"DM Sans", sans-serif' },
        hovertemplate: '%{y:.1f} GW<extra>New additions</extra>',
        cliponaxis: false,
      },
    ];

    const layout = {
      font: { family: '"DM Sans", sans-serif', color: '#808080', size: 12 },
      paper_bgcolor: 'rgba(0,0,0,0)',
      plot_bgcolor: 'rgba(0,0,0,0)',
      margin: { t: 30, r: 20, b: 40, l: 45, pad: 0 },
      title: null,
      barmode: 'stack',
      bargap: 0.35,
      xaxis: {
        showgrid: false, showline: false,
        tickfont: { size: 13, color: '#808080', family: '"DM Sans", sans-serif' },
        tickcolor: 'rgba(0,0,0,0)',
      },
      yaxis: {
        showgrid: true, gridcolor: '#E8E8E8', gridwidth: 1,
        showline: false,
        tickfont: { size: 12, color: '#808080', family: '"DM Sans", sans-serif' },
        tickcolor: 'rgba(0,0,0,0)',
        zeroline: true, zerolinecolor: '#D0D0D0', zerolinewidth: 1,
        range: [0, 16],
        ticksuffix: '',
        separatethousands: true,
      },
      legend: {
        orientation: 'h', yanchor: 'bottom', y: 1.02,
        xanchor: 'left', x: 0,
        font: { size: 13, color: '#555555', family: '"DM Sans", sans-serif' },
        bgcolor: 'rgba(255,255,255,0)', borderwidth: 0,
        itemsizing: 'constant', traceorder: 'normal',
      },
      hovermode: 'x unified',
      hoverlabel: {
        bgcolor: '#1A1A1A',
        font: { family: '"DM Sans", sans-serif', size: 13, color: '#FFFFFF' },
        bordercolor: '#1A1A1A',
      },
    };

    Plotly.newPlot('chart', data, layout, {
      responsive: true, displayModeBar: false, staticPlot: false,
    });
    window.addEventListener('resize', () => Plotly.Plots.resize('chart'));
  </script>
</body>
</html>
